name: Update Claude usage data

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch usage & cost data
        env:
          ORG1_ADMIN_KEY: ${{ secrets.ORG1_ADMIN_KEY }}
          ORG2_ADMIN_KEY: ${{ secrets.ORG2_ADMIN_KEY }}
          ORG3_ADMIN_KEY: ${{ secrets.ORG3_ADMIN_KEY }}
          ORG4_ADMIN_KEY: ${{ secrets.ORG4_ADMIN_KEY }}
          ORG5_ADMIN_KEY: ${{ secrets.ORG5_ADMIN_KEY }}
          ORG6_ADMIN_KEY: ${{ secrets.ORG6_ADMIN_KEY }}
        run: python scripts/fetch_usage.py

      - name: Commit updated data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --quiet --cached || git commit -m "Update Claude usage data"
          git push
